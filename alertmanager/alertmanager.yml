global:
  resolve_timeout: 5m

route:
  receiver: discord-default
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: discord-default
    discord_configs:
      - send_resolved: true
        webhook_url_file: /etc/alertmanager/secrets/discord-webhook-url
