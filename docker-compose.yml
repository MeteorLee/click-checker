services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: click-checker-app
    restart: unless-stopped
    environment:
      API_KEY_PEPPER: ${API_KEY_PEPPER:-local-dev-pepper}
      API_KEY_ENV: ${API_KEY_ENV:-live}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  postgres:
    image: postgres:16
    container_name: click-checker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - click-checker-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: click-checker-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - click-checker-prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.2.1
    container_name: click-checker-loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - click-checker-loki-data:/loki

  promtail:
    image: grafana/promtail:3.2.1
    container_name: click-checker-promtail
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - click-checker-promtail-data:/var/lib/promtail

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: click-checker-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:11.2.2
    container_name: click-checker-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    volumes:
      - click-checker-grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  click-checker-pg-data:
  click-checker-prometheus-data:
  click-checker-grafana-data:
  click-checker-loki-data:
  click-checker-promtail-data:
