name: Deploy to CodeDeploy (prod)

on:
  push:
    branches: ["prod"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.CODEDEPLOY_S3_BUCKET }}
      CODEDEPLOY_APPLICATION: ${{ secrets.CODEDEPLOY_APPLICATION }}
      CODEDEPLOY_DEPLOYMENT_GROUP: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP }}
      DEPLOY_BUNDLE: click-checker-${{ github.sha }}.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create deployment bundle
        run: |
          set -euo pipefail

          zip -r "${DEPLOY_BUNDLE}" \
            . \
            -x ".git/*" \
            -x ".github/*" \
            -x "build/*" \
            -x ".gradle/*" \
            -x ".idea/*" \
            -x "*.iml" \
            -x "out/*" \
            -x ".DS_Store"

      - name: Upload bundle to S3
        run: |
          set -euo pipefail

          aws s3 cp \
            "${DEPLOY_BUNDLE}" \
            "s3://${S3_BUCKET}/${DEPLOY_BUNDLE}"

      - name: Show deploy target configuration
        run: |
          set -euo pipefail

          echo "AWS_REGION=${AWS_REGION}"
          echo "CODEDEPLOY_APPLICATION=${CODEDEPLOY_APPLICATION}"
          echo "CODEDEPLOY_DEPLOYMENT_GROUP=${CODEDEPLOY_DEPLOYMENT_GROUP}"
          aws sts get-caller-identity
          aws deploy get-application \
            --application-name "${CODEDEPLOY_APPLICATION}" \
            --output table
          aws deploy get-deployment-group \
            --application-name "${CODEDEPLOY_APPLICATION}" \
            --deployment-group-name "${CODEDEPLOY_DEPLOYMENT_GROUP}" \
            --output table

      - name: Create CodeDeploy deployment
        id: create_deployment
        run: |
          set -euo pipefail

          deployment_id=$(
            aws deploy create-deployment \
              --application-name "${CODEDEPLOY_APPLICATION}" \
              --deployment-group-name "${CODEDEPLOY_DEPLOYMENT_GROUP}" \
              --s3-location "bucket=${S3_BUCKET},key=${DEPLOY_BUNDLE},bundleType=zip" \
              --file-exists-behavior OVERWRITE \
              --query 'deploymentId' \
              --output text
          )

          if [ -z "${deployment_id}" ] || [ "${deployment_id}" = "None" ]; then
            echo "Failed to create deployment id" >&2
            exit 1
          fi

          echo "deployment_id=${deployment_id}" >> "${GITHUB_OUTPUT}"
          echo "Created deployment: ${deployment_id}"

      - name: Wait for CodeDeploy deployment
        run: |
          set -euo pipefail

          aws deploy wait deployment-successful \
            --deployment-id "${{ steps.create_deployment.outputs.deployment_id }}"

      - name: Show deployment result
        if: always()
        run: |
          set -euo pipefail

          deployment_id="${{ steps.create_deployment.outputs.deployment_id }}"

          if [ -z "${deployment_id}" ]; then
            echo "DEPLOYMENT_ID is empty. Skipping deployment result lookup."
            exit 0
          fi

          aws deploy get-deployment \
            --deployment-id "${deployment_id}" \
            --query 'deploymentInfo.[status,errorInformation,message]' \
            --output table
