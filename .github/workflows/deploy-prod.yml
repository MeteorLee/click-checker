name: Deploy to EC2 (prod)

on:
  push:
    branches: [ "prod" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd ~/click-checker

            # ---- helpers ----
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
            compose_down() { $COMPOSE down --remove-orphans; }
            compose_up()   { $COMPOSE up -d --build app prometheus grafana; }
            require_env() {
              local key="$1"
              local value
              value=$(grep -E "^${key}=" .env | tail -n1 | cut -d'=' -f2- || true)
              if [ -z "${value}" ]; then
                echo "Missing required .env key: ${key}"
                return 1
              fi
            }
            dump_logs() {
              echo "---- docker compose ps ----"
              $COMPOSE ps || true
              echo "---- app logs (tail=200) ----"
              $COMPOSE logs --tail=200 app || true
              echo "---- postgres logs (tail=100) ----"
              $COMPOSE logs --tail=100 postgres || true
            }
            dump_smoke_org_response() {
              if [ ! -f /tmp/smoke_org.json ]; then
                echo "smoke_org.json not found"
                return
              fi

              echo "---- /tmp/smoke_org.json (redacted) ----"
              if jq -c '{id, apiKeyPrefix, apiKey:"[REDACTED]"}' /tmp/smoke_org.json >/tmp/smoke_org_redacted.json 2>/dev/null; then
                cat /tmp/smoke_org_redacted.json
              else
                echo "Response body redacted because it may contain apiKey."
              fi
            }

            wait_health() {
              local tries="${1:-12}"
              local sleep_s="${2:-5}"
              for i in $(seq 1 "$tries"); do
                if curl --max-time 5 -fsS http://localhost:8080/actuator/health 2>/dev/null | jq -e '.status == "UP"' >/dev/null; then
                  echo "Health check passed"
                  return 0
                fi
                echo "Health check retry ${i}/${tries}"
                sleep "$sleep_s"
              done
              return 1
            }

            smoke_post_json() {
              local url="$1"
              local data="$2"
              local out="$3"
              curl -sS -o "$out" -w "%{http_code}" \
                -H "Content-Type: application/json" \
                -X POST "$url" \
                -d "$data" || true
            }

            rollback() {
              echo "Start rollback to ${PREV_SHA}"
              git reset --hard "${PREV_SHA}"

              compose_down
              compose_up

              if wait_health 12 5; then
                echo "Rollback completed. Marking workflow as failed to surface deployment issue."
                exit 1
              fi

              echo "Rollback failed after retries"
              dump_logs
              exit 1
            }
            # -----------------

            # jq is required for smoke parsing (environment issue => fail fast)
            command -v jq >/dev/null 2>&1 || { echo "jq not installed on EC2"; exit 1; }
            [ -f .env ] || { echo ".env not found"; exit 1; }
            require_env POSTGRES_DB
            require_env POSTGRES_USER
            require_env POSTGRES_PASSWORD
            require_env DB_URL
            require_env DB_USERNAME
            require_env DB_PASSWORD
            require_env API_KEY_PEPPER
            require_env API_KEY_ENV

            git fetch origin
            git checkout prod
            PREV_SHA=$(git rev-parse HEAD)
            echo "PREV_SHA=${PREV_SHA}"

            git pull --ff-only origin prod

            compose_down
            if ! compose_up; then
              echo "Deploy failed during compose_up"
              dump_logs
              rollback
            fi

            # 1) health verification
            if ! wait_health 12 5; then
              echo "Deploy verification failed (health)"
              dump_logs
              rollback
            fi

            # 2) smoke verification
            SMOKE_OK=0
            TS=$(date +"%Y%m%d%H%M%S")
            NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            echo "Smoke: create organization"
            ORG_CODE=$(smoke_post_json "http://localhost:8080/api/organizations" \
              "{\"name\":\"__smoke-org-${TS}\"}" \
              "/tmp/smoke_org.json")

            echo "ORG_CODE=${ORG_CODE}"
            if [ "${ORG_CODE}" = "200" ] || [ "${ORG_CODE}" = "201" ]; then
              API_KEY=$(jq -r '.apiKey // empty' /tmp/smoke_org.json 2>/dev/null || true)

              if [ -n "${API_KEY}" ]; then
                echo "Smoke: post event"
                EVENT_BODY=$(jq -nc --arg externalUserId "deploy-smoke-user" --arg eventType "__smoke" --arg path "/__smoke/deploy" --arg occurredAt "${NOW}" --arg payload "{}" '{externalUserId:$externalUserId,eventType:$eventType,path:$path,occurredAt:$occurredAt,payload:$payload}')

                echo "---- EVENT_BODY ----"
                echo "${EVENT_BODY}"

                EVENT_CODE=$(curl -sS -o "/tmp/smoke_event.json" -w "%{http_code}" \
                  -H "Content-Type: application/json" \
                  -H "X-API-Key: ${API_KEY}" \
                  -X POST "http://localhost:8080/api/events" \
                  -d "${EVENT_BODY}" || true)

                echo "EVENT_CODE=${EVENT_CODE}"

                echo "Smoke: query aggregates"
                AGG_CODE=$(curl -sS -o "/tmp/smoke_agg.json" -w "%{http_code}" \
                  -H "X-API-Key: ${API_KEY}" \
                  "http://localhost:8080/api/events/aggregates/paths?from=2020-01-01T00:00:00Z&to=2030-01-01T00:00:00Z&top=5" || true)

                echo "AGG_CODE=${AGG_CODE}"

                if { [ "${EVENT_CODE}" = "200" ] || [ "${EVENT_CODE}" = "201" ]; } && [ "${AGG_CODE}" = "200" ]; then
                  SMOKE_OK=1
                  echo "Smoke check passed"
                else
                  echo "Smoke API failed"
                  echo "---- /tmp/smoke_event.json ----"
                  cat /tmp/smoke_event.json || true
                  echo "---- /tmp/smoke_agg.json ----"
                  cat /tmp/smoke_agg.json || true
                fi
              else
                echo "API_KEY parse failed"
                dump_smoke_org_response
              fi
            else
              echo "Organization create failed"
              dump_smoke_org_response
            fi

            if [ "${SMOKE_OK}" -ne 1 ]; then
              echo "Deploy verification failed (smoke)"
              dump_logs
              rollback
            fi

            echo "Deploy completed successfully"
