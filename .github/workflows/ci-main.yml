name: CI Main (Strong)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-strong:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run fast tests (H2)
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: ci

      - name: Run PostgreSQL compatibility tests
        run: ./gradlew postgresTest
