spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jpa:
    hibernate:
      ddl-auto: validate

server:
  shutdown: graceful

logging:
  level:
    root: info

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles:
        http.server.requests: 0.95,0.99
      percentiles-histogram:
        http.server.requests: true

sentry:
  dsn: ${SENTRY_DSN:}
  environment: prod
  send-default-pii: false
  traces-sample-rate: 0.0

app:
  api-key:
    env: live
    pepper: ${API_KEY_PEPPER:}
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
    refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
  rollup:
    enabled: true
