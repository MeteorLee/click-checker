spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/click_checker}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:apppw}
    hikari:
      pool-name: local-perf-pool
      minimum-idle: 10
      maximum-pool-size: 40
      connection-timeout: 30000
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: info
    com.clickchecker: debug
    org.springframework.web: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles:
        http.server.requests: 0.95,0.99
      percentiles-histogram:
        http.server.requests: true

sentry:
  dsn: ${SENTRY_DSN:}
  environment: local
  send-default-pii: true
  traces-sample-rate: 0.0

app:
  api-key:
    env: test
    pepper: ${API_KEY_PEPPER:local-dev-pepper}
