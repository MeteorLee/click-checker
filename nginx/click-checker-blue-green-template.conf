upstream click_checker_app {
    # Active app target on the compose network.
    # Switch this between app-blue:8081 and app-green:8082 during Blue/Green verification.
    server app-blue:8081;
}

server {
    server_name clickchecker.dev;

    # Public health endpoint. Keep this before the broader /actuator deny rule.
    location = /actuator/health {
        proxy_pass http://click_checker_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal actuator endpoints should not be exposed through the public entrypoint.
    location ^~ /actuator/ {
        return 403;
    }

    # Internal drain/control endpoints should not be exposed through the public entrypoint.
    location ^~ /internal/ {
        return 403;
    }

    location / {
        proxy_pass http://click_checker_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
    listen 80;
    listen [::]:80;
}
