upstream click_checker_app {
    # Current stable app target. Blue/Green operating cutover will eventually
    # change this single target instead of editing multiple proxy_pass lines.
    server 127.0.0.1:8082;
}

upstream click_checker_frontend {
    server 127.0.0.1:3001;
}

server {
    server_name clickchecker.dev;

    set $request_id_to_forward $http_x_request_id;
    if ($request_id_to_forward = "") {
        set $request_id_to_forward $request_id;
    }

    # Public health endpoint. Keep this before the broader /actuator deny rule.
    location = /actuator/health {
        proxy_pass http://click_checker_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id_to_forward;
    }

    location = /actuator/health/readiness {
        proxy_pass http://click_checker_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id_to_forward;
    }

    location ^~ /api/ {
        proxy_pass http://click_checker_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id_to_forward;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location ^~ /swagger-ui/ {
        proxy_pass http://click_checker_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id_to_forward;
    }

    location ^~ /v3/api-docs/ {
        proxy_pass http://click_checker_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id_to_forward;
    }

    # Internal actuator endpoints should not be exposed through the public entrypoint.
    location ^~ /actuator/ {
        return 403;
    }

    # Internal drain/control endpoints should only be called via direct app port.
    location ^~ /internal/ {
        return 403;
    }

    # Short-circuit obvious commodity scanner paths before they hit the app.
    location ~* ^/+(?:\.env(?:/|$)|\.git(?:/|$)|wp-admin(?:/|$)|wordpress(?:/|$)|wp-includes(?:/|$)|phpmyadmin(?:/|$)|cgi-bin(?:/|$)|xmlrpc\.php$|.*wlwmanifest\.xml$|.*\.(?:php|bak|old|save|dist|sample)$) {
        return 404;
    }

    location = /healthz {
        proxy_pass http://click_checker_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id_to_forward;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location ^~ /_next/ {
        proxy_pass http://click_checker_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id_to_forward;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location = /favicon.ico {
        proxy_pass http://click_checker_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id_to_forward;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://click_checker_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id_to_forward;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/clickchecker.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/clickchecker.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = clickchecker.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;

    server_name clickchecker.dev;
    return 404; # managed by Certbot
}

server {
    server_name grafana.clickchecker.dev;

    set $request_id_to_forward $http_x_request_id;
    if ($request_id_to_forward = "") {
        set $request_id_to_forward $request_id;
    }

    auth_basic "Grafana Admin";
    auth_basic_user_file /etc/nginx/.htpasswd-grafana;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id_to_forward;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/clickchecker.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/clickchecker.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = grafana.clickchecker.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;

    server_name grafana.clickchecker.dev;
    return 404; # managed by Certbot
}
